# Story 2.4 (F4) — Definição declarativa do Container App do n8n (referência IaC).
#
# Este arquivo é o CONTRATO de configuração versionado do n8n self-hosted em Azure
# Container Apps. NÃO provisiona nada sozinho — serve como (a) fonte da verdade para o
# workflow .github/workflows/deploy-phase-04.yml e (b) base para `az containerapp create
# --yaml`/`update --yaml` caso a turma prefira aplicar o YAML diretamente.
#
# Placeholders <...> são substituídos pelos valores do aluno (vars/secrets do repo).
#
# Decisões fixadas:
#   - Imagem: n8nio/n8n:latest         → ADE-002 Inv 4 (decisão de owner; sempre latest).
#   - Ingress: external, HTTPS only    → AC-10 (HTTP→HTTPS automático no ACA ingress).
#   - Target port: 5678                → porta padrão do n8n.
#   - Persistência: Azure Files share  → AC-4, montado em /home/node/.n8n.
#   - Basic auth: obrigatório          → AC-10 (senha via secret do Container App).
#   - Scale: min 0 / max 2, 0.5 vCPU / 1Gi → Dev Notes (Consumption, scale-to-zero).
#
# Env vars rastreadas a https://docs.n8n.io/hosting/environment-variables/ (AC-13).
#
# Aplicar (alternativa ao workflow):
#   az containerapp create --name <n8n-app> --resource-group <rg> \
#     --environment <cae-fifa2026-xy> --yaml infra/phase-04/n8n-containerapp.yaml

type: Microsoft.App/containerApps
name: <PHASE04_N8N_APP_NAME>            # ex.: ca-n8n-fifa2026-xy
properties:
  managedEnvironmentId: <CAE_RESOURCE_ID>   # /subscriptions/.../managedEnvironments/cae-fifa2026-xy
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true                   # AC-10 — acesso externo via HTTPS
      transport: http
      targetPort: 5678                 # porta padrão do n8n
      allowInsecure: false             # AC-10 — HTTPS only (HTTP é redirecionado)
      traffic:
        - latestRevision: true
          weight: 100
    secrets:
      # Senha do basic auth — nunca em texto no YAML versionado; injetada no deploy.
      - name: n8n-basic-auth-password
        value: <N8N_BASIC_AUTH_PASSWORD>   # secret do repo, aplicado pelo workflow
  template:
    containers:
      - name: n8n
        image: n8nio/n8n:latest        # ADE-002 Inv 4 — decisão de owner
        resources:
          cpu: 0.5
          memory: 1.0Gi
        env:
          # --- Basic auth (AC-10) ---
          - name: N8N_BASIC_AUTH_ACTIVE
            value: "true"
          - name: N8N_BASIC_AUTH_USER
            value: "admin"
          - name: N8N_BASIC_AUTH_PASSWORD
            secretRef: n8n-basic-auth-password
          # --- Host / webhook (AC-3) ---
          - name: N8N_HOST
            value: <PHASE04_N8N_FQDN_HOST>     # FQDN público do Container App
          - name: WEBHOOK_URL
            value: https://<PHASE04_N8N_FQDN_HOST>
          - name: N8N_PROTOCOL
            value: "https"
          - name: N8N_PORT
            value: "5678"
          # --- Persistência / misc ---
          - name: DB_TYPE
            value: "sqlite"            # default; persistido via Azure Files (AC-4)
          - name: GENERIC_TIMEZONE
            value: "America/Sao_Paulo"
        volumeMounts:
          - volumeName: n8n-data       # AC-4 — preserva workflows entre restarts
            mountPath: /home/node/.n8n
    scale:
      minReplicas: 0                   # scale-to-zero (custo ~0 em repouso)
      maxReplicas: 2
    volumes:
      - name: n8n-data
        storageType: AzureFile
        storageName: <PHASE04_ACA_STORAGE_NAME>   # storage registrado no CAE (file share n8n-data)
